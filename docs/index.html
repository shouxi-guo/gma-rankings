<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>金曲獎資料庫 GMA Rankings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand-block">
        <h1>🏆 金曲獎資料庫 <span>GMA Rankings</span></h1>
        <p class="subtitle">資料來源：文化部影視及流行音樂產業局開放資料</p>
      </div>

      <div class="header-tools">
        <div id="langSwitch" class="lang-switch" role="group" aria-label="繁簡切換">
          <button type="button" data-lang="trad">繁體中文</button>
          <button type="button" data-lang="simp">简体中文</button>
        </div>
        <div class="global-search">
          <label for="globalSearch">搜尋人名 / 團體</label>
          <input id="globalSearch" type="search" autocomplete="off" placeholder="例：蔡依林、五月天">
          <div id="suggestions" class="suggestions" hidden></div>
        </div>
      </div>
    </div>

    <nav class="tabs" aria-label="主要檢視">
      <button class="tab is-active" data-tab="ranking" type="button">排行榜</button>
      <button class="tab" data-tab="person" type="button">個人頁</button>
      <button class="tab" data-tab="edition" type="button">依屆次</button>
      <button class="tab" data-tab="award" type="button">依獎項</button>
      <button class="tab" data-tab="lineage" type="button">獎項沿革</button>
    </nav>
  </header>

  <main>
    <section id="status" class="status">載入資料中...</section>
    <section id="app" hidden></section>
  </main>

  <footer>
    <a href="https://data.gov.tw/dataset/58037">https://data.gov.tw/dataset/58037</a>
    <span>本站為非官方資料整理，獎項與得獎名單以主辦單位公告為準。</span>
    <span>第36/37屆資料整理自維基百科。</span>
  </footer>

  <script src="t2s.js"></script>
  <script src="app.js"></script>
</body>
</html>
