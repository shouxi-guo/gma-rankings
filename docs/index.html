<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>金曲獎資料庫 GMA Rankings</title>
  <meta name="author" content="shouxi">
  <meta name="description" content="台灣金曲獎第 1–37 屆入圍/得獎紀錄查詢：歌手排行榜、獎項沿革、依屆次/獎項瀏覽，支援簡繁互搜。">
  <meta property="og:title" content="金曲獎資料庫 GMA Rankings">
  <meta property="og:description" content="台灣金曲獎第 1–37 屆入圍/得獎紀錄查詢：歌手排行榜、獎項沿革、簡繁互搜。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shouxi-guo.github.io/gma-rankings/">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand-block">
        <h1>🏆 金曲獎資料庫 <span>GMA Rankings</span></h1>
        <p class="subtitle">資料來源：文化部影視及流行音樂產業局開放資料</p>
      </div>

      <div class="header-tools">
        <div id="langSwitch" class="lang-switch" role="group" aria-label="繁簡切換">
          <button type="button" data-lang="trad">繁體中文</button>
          <button type="button" data-lang="simp">简体中文</button>
        </div>
        <div class="global-search">
          <label for="globalSearch">搜尋人名 / 團體</label>
          <input id="globalSearch" type="search" autocomplete="off" placeholder="例：蔡依林、五月天">
          <div id="suggestions" class="suggestions" hidden></div>
        </div>
      </div>
    </div>

    <nav class="tabs" aria-label="主要檢視">
      <button class="tab is-active" data-tab="ranking" type="button">排行榜</button>
      <button class="tab" data-tab="person" type="button">個人頁</button>
      <button class="tab" data-tab="edition" type="button">依屆次</button>
      <button class="tab" data-tab="award" type="button">依獎項</button>
      <button class="tab" data-tab="stats" type="button">統計圖表</button>
      <button class="tab" data-tab="lineage" type="button">獎項沿革</button>
    </nav>
  </header>

  <main>
    <section id="status" class="status">載入資料中...</section>
    <section id="app" hidden></section>
  </main>

  <footer>
    <a href="https://data.gov.tw/dataset/58037">https://data.gov.tw/dataset/58037</a>
    <span>本站為非官方資料整理，獎項與得獎名單以主辦單位公告為準。</span>
    <span>第36/37屆資料整理自維基百科。</span>
    <span class="credit">© 2026 shouxi ·
      <a href="https://github.com/shouxi-guo/gma-rankings">GitHub</a></span>
    <span id="busuanzi_container_site_pv" style="display:none">訪問量
      <span id="busuanzi_value_site_pv"></span> 次 · 訪客
      <span id="busuanzi_value_site_uv" class="bsz-uv"></span> 人</span>
  </footer>

  <script src="t2s.js"></script>
  <script src="app.js"></script>
  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
